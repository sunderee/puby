name: puby
description: Dart-based CLI app for managing dependencies in pubspec.yaml
version: 2.0.1
publish_to: "none"

environment:
  sdk: ">=3.6.1"

dependencies:
  # CLI arguments parser
  args: ^2.6.0

  # YAML
  yaml: ^3.1.3

  # Utilities
  dart_scope_functions: ^1.0.0
  collection: ^1.19.1
  meta: ^1.16.0
  equatable: ^2.0.7

dev_dependencies:
  lints: ^5.1.1
  test: ^1.25.14
